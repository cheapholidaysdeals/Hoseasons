name: Daily AWIN to Supabase Sync

# Controls when the action will run. 
on:
  schedule:
    # Runs at 02:00 AM UTC every day. You can change this using cron syntax.
    - cron: '0 2 * * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      # Checks out your repository under $GITHUB_WORKSPACE
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      # Installs the required libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Runs the script using your secrets
      - name: Run AWIN Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
        run: python sync_awin.py
